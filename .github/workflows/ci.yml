name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-tokens:
    name: Validate tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run validate

  build:
    name: Build tokens
    needs: validate-tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run build

  changeset:
    name: Changeset present
    # Skip the changeset gate for automated maintenance PRs (e.g. Dependabot)
    # and the Changesets release PR — none of these touch the token API.
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref != 'changeset-release/main' &&
      !startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npx changeset status --since=origin/main
